<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Job Dashboard</title>
    <link rel="shortcut icon" href="../../../assets/images/JobNest-logo.png" type="image/x-icon">
    <link rel="stylesheet" href="controlJob.css">
    <script src="controlJob.js" type="module" defer></script>
</head>

<body>
    <!-- Top Navbar -->
    <nav class="navbar">
        <a href="controlJob.html" style="text-decoration:none;">
            <div class="navbar-brand">
                <img src="../../../assets/images/JobNest-logo.png" alt="JobNest logo"
                    style="width:24px; height:24px; object-fit: contain; border-radius: 6px;">
                <span style="color: #1f6feb;">Job</span><span style="color: #0f2d6b; margin-left: -6px;">Nest</span>
            </div>
        </a>
        <div class="navbar-links">
            <a href="../uploadJob/uploadJob.html" class="nav-link"><b>Upload Job</b></a>
        </div>
        <div class="navbar-user">
            <button class="profile-menu" id="profileMenuButton" type="button" aria-label="Account menu"
                aria-haspopup="dialog" aria-expanded="false" aria-controls="companyDrawerOverlay">
                <span class="menu-lines" aria-hidden="true"><span></span></span>
                <img id="headerProfileAvatar" src="" alt="Company Logo">
            </button>
        </div>
    </nav>


    <!-- Main Content -->
    <main class="container">

        <!-- Second Row: Statistics & Action -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="stat-total-jobs">0</div>
                <div class="stat-label">Active Jobs</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-total-apps">0</div>
                <div class="stat-label">Total Applications</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-shortlisted">0</div>
                <div class="stat-label">Shortlisted</div>
            </div>
            <div>
                <button class="post-job-btn" type="button" onclick="window.location.href='../uploadJob/uploadJob.html'">
                    <svg class="icon" style="width:20px; height:20px" viewBox="0 0 24 24">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Post New Job
                </button>
            </div>
        </div>


        <!-- Third Row: Active Jobs List -->
        <div class="section-header">
            <h2 class="section-title">Manage Posted Jobs</h2>
        </div>

        <div class="job-list" id="job-list-container">
            <!-- Jobs will be injected here via JavaScript -->
        </div>
    </main>
    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-brand-block">
                <a class="brand footer-brand" href="#">
                    <svg viewBox="0 0 36 36">
                        <circle cx="18" cy="18" r="17" fill="currentColor"></circle>
                        <path
                            d="M16.2 7.8c-4.4.7-8 4.3-8.7 8.7 2.5-1.6 5.9-1.4 8.2.8 2.3 2.3 2.5 5.7.8 8.2 4.4-.7 8-4.3 8.7-8.7-2.5 1.6-5.9 1.4-8.2-.8-2.3-2.3-2.5-5.7-.8-8.2Z"
                            fill="#fff"></path>
                        <circle cx="18" cy="18" r="4.1" fill="#fff"></circle>
                    </svg>
                    <span class="brand-wordmark"><span class="brand-blue">naukri</span><span
                            class="brand-orange">campus</span></span>
                </a>
            </div>
            <div class="footer-links">
                <div>
                    <a href="#">About us</a>
                    <a href="#">Careers</a>
                    <a href="#">Employer home</a>
                </div>
                <div style="margin-top: 0.8rem;">
                    <a href="#">Help center</a>
                    <a href="#">Report issue</a>
                </div>
                <div>
                    <a href="#">Privacy policy</a>
                    <a href="#">Terms &amp; conditions</a>
                    <a href="#">Trust &amp; safety</a>
                </div>
            </div>
        </div>
    </footer>

        <div class="company-overlay" id="companyDrawerOverlay" hidden>
        <aside class="company-sidebar" role="dialog" aria-modal="true" aria-labelledby="drawerCompanyName">
            <button class="company-sidebar-close" id="companyDrawerClose" type="button" aria-label="Close company panel">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M6 6 18 18"></path>
                    <path d="M18 6 6 18"></path>
                </svg>
            </button>

            <div class="company-sidebar-shell">
                <header class="company-sidebar-header">
                    <div class="company-sidebar-logo" id="drawerCompanyLogo">NC</div>
                    <div class="company-sidebar-copy">
                        <h2 class="company-sidebar-name" id="drawerCompanyName">Company Name</h2>
                        <p class="company-sidebar-location" id="drawerCompanyLocation">Location not added</p>
                    </div>
                </header>

                <nav class="company-sidebar-menu" aria-label="Company account actions">
                    <button class="company-menu-item company-menu-item--primary" id="drawerViewProfile" type="button">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                            <path d="M6.5 17A2.5 2.5 0 0 0 4 14.5V5a2 2 0 0 1 2-2h14v14"></path>
                            <path d="M8 7h8"></path>
                            <path d="M8 11h6"></path>
                        </svg>
                        <span>View &amp; Update Profile</span>
                    </button>
                    <button class="company-menu-item" id="drawerSearchAppearance" type="button">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <circle cx="11" cy="11" r="6"></circle>
                            <path d="m20 20-4.2-4.2"></path>
                        </svg>
                        <span>Search Appearance</span>
                    </button>
                    <button class="company-menu-item" id="drawerSettings" type="button">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 0 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.2a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 0 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.2a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 0 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3h.1a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.2a1.7 1.7 0 0 0 1 1.5h.1a1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 0 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8v.1a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.2a1.7 1.7 0 0 0-1.4 1z"></path>
                        </svg>
                        <span>Settings</span>
                    </button>
                    <button class="company-menu-item" id="drawerFaq" type="button">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M9.1 9a3 3 0 1 1 5.8 1c-.4 1.2-1.5 1.8-2.2 2.3-.7.4-1.1.9-1.1 1.7"></path>
                            <circle cx="12" cy="17.2" r=".8" fill="currentColor" stroke="none"></circle>
                            <circle cx="12" cy="12" r="9"></circle>
                        </svg>
                        <span>FAQ</span>
                    </button>
                </nav>

                <div class="company-sidebar-footer">
                    <button id="logoutBtn" class="company-menu-item company-menu-item--logout" type="button">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M10 17 15 12 10 7"></path>
                            <path d="M15 12H4"></path>
                            <path d="M12 4h5a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-5"></path>
                        </svg>
                        <span>Logout</span>
                    </button>
                </div>
            </div>
        </aside>
    </div>
</body>
</html>
