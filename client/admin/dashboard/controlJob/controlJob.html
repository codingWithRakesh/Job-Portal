<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Job Dashboard - Pro</title>
    <link rel="stylesheet" href="controlJob.css">
    <script src="controlJob.js" type="module" defer></script>
</head>
<body>
    <!-- Top Navbar -->
    <nav class="navbar">
        <div class="navbar-brand">
            <svg class="icon" style="width:24px; height:24px" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
            TechCorp
        </div>
        <div class="navbar-user">
            <button class="profile-menu" id="profileMenuButton" type="button" aria-label="Account menu"
                aria-haspopup="menu" aria-expanded="false" aria-controls="profilePopup">
                <img src="https://i.pravatar.cc/150?img=33" alt="Company Logo">
            </button>

            <div class="profile-popup" id="profilePopup" role="menu" aria-labelledby="profileMenuButton" hidden>
                <p class="profile-popup-title">Hello CYRUS</p>
                <button class="profile-popup-button" id="logoutButton" type="button" role="menuitem">Logout</button>
            </div>
        </div>

    </nav>
    

    <!-- Main Content -->
    <main class="container">
        
        <!-- Second Row: Statistics & Action -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="stat-total-jobs">0</div>
                <div class="stat-label">Active Jobs</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-total-apps">0</div>
                <div class="stat-label">Total Applications</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-shortlisted">0</div>
                <div class="stat-label">Shortlisted</div>
            </div>
            <div>
                <button class="post-job-btn" type="button" onclick="window.location.href='../uploadJob/uploadJob.html'">
                    <svg class="icon" style="width:20px; height:20px" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    Post New Job
                </button>
            </div>
        </div>
    

        <!-- Third Row: Active Jobs List -->
        <div class="section-header">
            <h2 class="section-title">Manage Posted Jobs</h2>
        </div>
        
        <div class="job-list" id="job-list-container">
            <!-- Jobs will be injected here via JavaScript -->
        </div>
    </main>
    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-brand-block">
                <a class="brand footer-brand" href="#">
                    <svg viewBox="0 0 36 36">
                        <circle cx="18" cy="18" r="17" fill="currentColor"></circle>
                        <path
                            d="M16.2 7.8c-4.4.7-8 4.3-8.7 8.7 2.5-1.6 5.9-1.4 8.2.8 2.3 2.3 2.5 5.7.8 8.2 4.4-.7 8-4.3 8.7-8.7-2.5 1.6-5.9 1.4-8.2-.8-2.3-2.3-2.5-5.7-.8-8.2Z"
                            fill="#fff"></path>
                        <circle cx="18" cy="18" r="4.1" fill="#fff"></circle>
                    </svg>
                    <span class="brand-wordmark"><span class="brand-blue">naukri</span><span
                            class="brand-orange">campus</span></span>
                </a>
            </div>
            <div class="footer-links">
                <div>
                    <a href="#">About us</a>
                    <a href="#">Careers</a>
                    <a href="#">Employer home</a>
                </div>
                <div style="margin-top: 0.8rem;">
                    <a href="#">Help center</a>
                    <a href="#">Report issue</a>
                </div>
                <div>
                    <a href="#">Privacy policy</a>
                    <a href="#">Terms &amp; conditions</a>
                    <a href="#">Trust &amp; safety</a>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
