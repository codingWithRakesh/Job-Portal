<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account Setup Flow</title>
<link rel="stylesheet" href="login.css">
</head>
<body>

  <div id="step-signin" class="step active">
    <div class="card">
      <div class="left-panel">
        <div class="logo">
          <div class="logo-icon">L</div>
          Logo
        </div>
        <h1>Sign in</h1>
        <p class="subtitle">to continue to your account</p>
      </div>
      
      <div class="right-panel">
        <div class="form-group">
          <input type="email" placeholder="Email" required>
        </div>
        <div class="form-group">
          <input type="password" placeholder="Password" required>
        </div>
        
        <div class="actions">
          <div class="links-group">
            <button class="btn-link" type="button">Forgot password?</button>
            <button class="btn-link" type="button" onclick="navigate('step-signin', 'step-create-account')">Create account</button>
          </div>
          <button class="btn-primary" type="button">Next</button>
        </div>
      </div>
    </div>
  </div>

  <div id="step-create-account" class="step">
    <div class="card">
      <div class="left-panel">
        <div class="logo">
          <div class="logo-icon">L</div>
          Logo
        </div>
        <h1>Create Account</h1>
        <p class="subtitle">Enter your details to get started</p>
      </div>
      
      <div class="right-panel">
        <div class="form-group">
          <input type="text" placeholder="Name" required>
        </div>
        <div class="form-group">
          <input type="email" placeholder="Email" required>
        </div>
        
        <div class="actions">
          <button class="btn-ghost" type="button" onclick="navigate('step-create-account', 'step-signin')">Back</button>
          <button class="btn-primary" type="button" onclick="navigate('step-create-account', 'step-password')">Next</button>
        </div>
      </div>
    </div>
  </div>

  <div id="step-password" class="step">
    <div class="card">
      <div class="left-panel">
        <div class="logo">
          <div class="logo-icon">L</div>
          Logo
        </div>
        <h1>Create Your Password</h1>
        <p class="subtitle">Secure your new account</p>
      </div>
      
      <div class="right-panel">
        <div class="form-group">
          <input type="password" id="new-password" placeholder="Password" required>
        </div>
        <div class="form-group">
          <input type="password" id="confirm-password" placeholder="Confirm Password" required>
        </div>
        <label class="checkbox-group">
          <input type="checkbox" onchange="togglePasswordVisibility(this)">
          Show password
        </label>
        
        <div class="actions">
           <button class="btn-ghost" type="button" onclick="navigate('step-password', 'step-create-account')">Back</button>
          <button class="btn-primary" type="button">Next</button>
        </div>
      </div>
    </div>
  </div>

  <script src="login.js">
    
  </script>
</body>
</html>
