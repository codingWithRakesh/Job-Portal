<!DOCTYPE html>
<html lang="en">


<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Setup Flow</title>
  <link rel="shortcut icon" href="../../../assets/images/JobNest-logo.png" type="image/x-icon">
  <link rel="stylesheet" href="login.css">
  <script src="login.js" type="module" defer></script>
</head>


<body>


  <!-- Step 1: Sign In -->
  <div id="step-signin" class="step active">
    <div class="card">
      <div class="left-panel">
        <div class="logo">
          <div class="logo-icon">
            <img src="../../../assets/images/JobNest-logo.png" alt="JobNest logo"
              style="width: 100%; height: 100%; object-fit: contain; border-radius: 8px;">
          </div>
          <span style="color: #1f6feb;">Job</span><span style="color: #0f2d6b; margin-left: -6px;">Nest</span>
        </div>
        <h1>Sign in</h1>
        <p class="subtitle">to continue to your account</p>
      </div>

      <div class="right-panel">
        <div id="signin-error" class="error-msg" style="display:none;"></div>
        <div class="form-group">
          <input id="signin-email" type="email" placeholder="Email" required>
        </div>
        <div class="form-group">
          <input id="signin-password" type="password" placeholder="Password" required>
        </div>

        <div class="actions">
          <div class="links-group">
            <button class="btn-link" type="button">Forgot password?</button>
            <button class="btn-link" type="button" id="go-to-create">Create account</button>
          </div>
          <button class="btn-primary" type="button" id="signin-btn">Next</button>
        </div>
      </div>
    </div>
  </div>


  <!-- Step 2: Create Account (name + email) -->
  <div id="step-create-account" class="step">
    <div class="card">
      <div class="left-panel">
        <div class="logo">
          <div class="logo-icon">
            <img src="../../../assets/images/JobNest-logo.png" alt="JobNest logo"
              style="width: 100%; height: 100%; object-fit: contain; border-radius: 8px;">
          </div>
          <span style="color: #1f6feb;">Job</span><span style="color: #0f2d6b; margin-left: -3px;">Nest</span>
        </div>
        <h1>Create Account</h1>
        <p class="subtitle">Enter your details to get started</p>
      </div>

      <div class="right-panel">
        <div class="form-group">
          <input id="register-name" type="text" placeholder="Name" required>
        </div>
        <div class="form-group">
          <input id="register-email" type="email" placeholder="Email" required>
        </div>

        <div class="actions">
          <button class="btn-ghost" type="button" id="back-to-signin">Back</button>
          <button class="btn-primary" type="button" id="go-to-password">Next</button>
        </div>
      </div>
    </div>
  </div>


  <!-- Step 3: Set Password -->
  <div id="step-password" class="step">
    <div class="card">
      <div class="left-panel">
        <div class="logo">
          <div class="logo-icon">
            <img src="../../../assets/images/JobNest-logo.png" alt="JobNest logo"
              style="width: 100%; height: 100%; object-fit: contain; border-radius: 8px;">
          </div>
          <span style="color: #1f6feb;">Job</span><span style="color: #0f2d6b; margin-left: -3px;">Nest</span>
        </div>
        <h1>Create Your Password</h1>
        <p class="subtitle">Secure your new account</p>
      </div>

      <div class="right-panel">
        <div id="register-error" class="error-msg" style="display:none;"></div>
        <div class="form-group">
          <input type="password" id="new-password" placeholder="Password" required>
        </div>
        <div class="form-group">
          <input type="password" id="confirm-password" placeholder="Confirm Password" required>
        </div>
        <label class="checkbox-group">
          <input type="checkbox" id="show-password-toggle">
          Show password
        </label>


        <div class="actions">
          <button class="btn-ghost" type="button" id="back-to-create">Back</button>
          <button class="btn-primary" type="button" id="register-btn">Next</button>
        </div>
      </div>
    </div>
  </div>

</body>

</html>
