<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account Setup Flow</title>
<link rel="stylesheet" href="login.css">
</head>
<body>

  <div id="page1" class="step active">
    <div class="card">
      <div class="left-panel">
        <div class="logo">
          <div class="logo-icon">L</div>
          Logo
        </div>
        <h1>Sign in</h1>
        <p class="subtitle">to continue to your account</p>
      </div>
      
      <div class="right-panel">
        <div class="form-group">
          <input type="email" placeholder="Email" required>
        </div>
        <div class="form-group">
          <input type="password" placeholder="Password" required>
        </div>
        
        <div class="actions">
          <div class="links-group">
            <button class="btn-link" type="button">Forgot password?</button>
            <button class="btn-link" type="button" onclick="navigate('page1', 'page2')">Create account</button>
          </div>
          <button class="btn-primary" type="button">Next</button>
        </div>
      </div>
    </div>
  </div>

  <div id="page2" class="step">
    <div class="card">
      <div class="left-panel">
        <div class="logo">
          <div class="logo-icon">L</div>
          Logo
        </div>
        <h1>Create Account</h1>
        <p class="subtitle">Enter your details to get started</p>
      </div>
      
      <div class="right-panel">
        <div class="form-group">
          <input type="text" placeholder="Name" required>
        </div>
        <div class="form-group">
          <input type="email" placeholder="Email" required>
        </div>
        
        <div class="actions">
          <button class="btn-ghost" type="button" onclick="navigate('page2', 'page1')">Back</button>
          <button class="btn-primary" type="button" onclick="navigate('page2', 'page3')">Next</button>
        </div>
      </div>
    </div>
  </div>

  <div id="page3" class="step">
    <div class="card">
      <div class="left-panel">
        <div class="logo">
          <div class="logo-icon">L</div>
          Logo
        </div>
        <h1>Basic Information</h1>
        <p class="subtitle">Tell us a bit more about yourself</p>
      </div>
      
      <div class="right-panel">
        <div class="form-row">
          <div class="form-group">
            <select aria-label="Month">
              <option value="" disabled selected>Month</option>
              <option value="1">Jan</option>
              <option value="2">Feb</option>
              </select>
          </div>
          <div class="form-group">
            <select aria-label="Day">
              <option value="" disabled selected>Day</option>
              <option value="1">1</option>
              <option value="2">2</option>
              </select>
          </div>
          <div class="form-group">
            <select aria-label="Year">
              <option value="" disabled selected>Year</option>
              <option value="2024">2024</option>
              <option value="2023">2023</option>
              </select>
          </div>
        </div>
        <div class="form-group">
          <select aria-label="Gender">
            <option value="" disabled selected>Gender</option>
            <option value="female">Female</option>
            <option value="male">Male</option>
            <option value="custom">Custom</option>
            <option value="none">Prefer not to say</option>
          </select>
        </div>
        
        <div class="actions">
          <button class="btn-ghost" type="button" onclick="navigate('page3', 'page2')">Back</button>
          <button class="btn-primary" type="button" onclick="navigate('page3', 'page4')">Next</button>
        </div>
      </div>
    </div>
  </div>

  <div id="page4" class="step">
    <div class="card">
      <div class="left-panel">
        <div class="logo">
          <div class="logo-icon">L</div>
          Logo
        </div>
        <h1>Create Your Password</h1>
        <p class="subtitle">Secure your new account</p>
      </div>
      
      <div class="right-panel">
        <div class="form-group">
          <input type="password" id="new-password" placeholder="Password" required>
        </div>
        <div class="form-group">
          <input type="password" id="confirm-password" placeholder="Confirm Password" required>
        </div>
        <label class="checkbox-group">
          <input type="checkbox" onchange="togglePasswordVisibility(this)">
          Show password
        </label>
        
        <div class="actions">
           <button class="btn-ghost" type="button" onclick="navigate('page4', 'page3')">Back</button>
          <button class="btn-primary" type="button">Next</button>
        </div>
      </div>
    </div>
  </div>

  <script src="login.js">
    // Handle Page Navigation
    
  </script>
</body>
</html>
