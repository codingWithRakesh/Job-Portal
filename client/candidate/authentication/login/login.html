<!DOCTYPE html>
<html lang="en">


<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Setup Flow</title>
  <script>(function () { try { if (localStorage.getItem("theme") === "dark") { document.documentElement.classList.add("theme-dark"); } } catch (error) { } })();</script>
  <link rel="shortcut icon" href="../../../assets/images/JobNest-logo.png" type="image/x-icon">
  <link rel="stylesheet" href="../../../assets/css/theme.css">
  <link rel="stylesheet" href="login.css">
  <script src="../../../assets/js/theme.js" defer></script>
  <script src="login.js" type="module" defer></script>
</head>


<body>
  <div class="auth-page">
    <header class="auth-topbar">
      <div class="auth-role-switcher" data-admin-login="../../../admin/authentication/login/login.html"
        data-candidate-login="../../../candidate/authentication/login/login.html">
        <span class="auth-role-switch-question">Are you an admin?</span>
        <a class="auth-role-switch" href="../../../admin/authentication/login/login.html"
          aria-label="Switch to admin login">
          <span class="auth-role-switch-label">Admin Login</span>
        </a>
      </div>
    </header>

    <!-- Page 1: Sign In -->
    <div id="page1" class="step active">
      <div class="card">
        <div class="left-panel">
          <div class="logo">
            <div class="logo-icon">
              <img src="../../../assets/images/JobNest-logo.png" alt="JobNest logo"
                style="width: 100%; height: 100%; object-fit: contain; border-radius: 8px;">
            </div>
            <span style="color: #1f6feb;">Job</span><span style="color: #0f2d6b; margin-left: -6px;">Nest</span>
          </div>
          <h1>Sign in</h1>
          <p class="subtitle">to continue to your account</p>
        </div>

        <div class="right-panel">
          <div class="form-group">
            <input type="email" placeholder="Email" required>
          </div>
          <div class="form-group">
            <input type="password" placeholder="Password" required>
          </div>


          <div class="actions">
            <div class="links-group">
              <button class="btn-link" type="button">Forgot password?</button>
              <!-- ID added to handle navigation in JS -->
              <button id="btn-go-to-register" class="btn-link" type="button">Create account</button>
            </div>
            <button id="btn-login-submit" class="btn-primary" type="button">Next</button>
          </div>
        </div>
      </div>
    </div>
  


    <!-- Page 2: Registration Step 1 -->
    <div id="page2" class="step">
      <div class="card">
        <div class="left-panel">
          <div class="logo">
            <div class="logo-icon">
              <img src="../../../assets/images/JobNest-logo.png" alt="JobNest logo"
                style="width: 100%; height: 100%; object-fit: contain; border-radius: 8px;">
            </div>
            <span style="color: #1f6feb;">Job</span><span style="color: #0f2d6b; margin-left: -3px;">Nest</span>
          </div>
          <h1>Create Account</h1>
          <p class="subtitle">Enter your details to get started</p>
        </div>


        <div class="right-panel">
          <div class="form-group">
            <input type="text" placeholder="Name" required>
          </div>
          <div class="form-group">
            <input type="email" placeholder="Email" required>
          </div>


          <div class="actions">
            <!-- ID added for back button -->
            <button id="btn-back-to-login" class="btn-ghost" type="button">Back</button>
            <button id="btn-register-step1-next" class="btn-primary" type="button">Next</button>
          </div>
        </div>
      </div>
    </div>
  


    <!-- Page 3: Registration Step 2 (Basic Info) -->
    <div id="page3" class="step">
      <div class="card">
        <div class="left-panel">
          <div class="logo">
            <div class="logo-icon">
              <img src="../../../assets/images/JobNest-logo.png" alt="JobNest logo"
                style="width: 100%; height: 100%; object-fit: contain; border-radius: 8px;">
            </div>
            <span style="color: #1f6feb;">Job</span><span style="color: #0f2d6b; margin-left: -3px;">Nest</span>
          </div>
          <h1>Basic Information</h1>
          <p class="subtitle">Tell us a bit more about yourself</p>
        </div>

        <div class="right-panel">
          <div class="form-row">
            <div class="form-group">
              <select aria-label="Month">
                <option value="" disabled selected>Month</option>
                <option value="1">Jan</option>
                <option value="2">Feb</option>
                <option value="3">Mar</option>
                <option value="4">Apr</option>
                <option value="5">May</option>
                <option value="6">Jun</option>
                <option value="7">Jul</option>
                <option value="8">Aug</option>
                <option value="9">Sep</option>
                <option value="10">Oct</option>
                <option value="11">Nov</option>
                <option value="12">Dec</option>
              </select>
            </div>
            <div class="form-group">
              <select aria-label="Day" required>
                <option value="" disabled selected>Day</option>
                </select>
            </div>
            <div class="form-group">
              <select aria-label="Year" required>
                <option value="" disabled selected>Year</option>
                </select>
            </div>
          </div>
          <div class="form-group">
            <select aria-label="Gender">
              <option value="" disabled selected>Gender</option>
              <option value="Female">Female</option>
              <option value="Male">Male</option>
              <option value="Other">Other</option>
            </select>
          </div>


          <div class="actions">
            <!-- ID added for back button -->
            <button id="btn-back-to-register-step1" class="btn-ghost" type="button">Back</button>
            <button id="btn-register-step2-next" class="btn-primary" type="button">Next</button>
          </div>
        </div>
      </div>
    

  
    <!-- Page 4: Registration Step 3 (Password) -->
    <div id="page4" class="step">
      <div class="card">
        <div class="left-panel">
          <div class="logo">
            <div class="logo-icon">
              <img src="../../../assets/images/JobNest-logo.png" alt="JobNest logo"
                style="width: 100%; height: 100%; object-fit: contain; border-radius: 8px;">
            </div>
            <span style="color: #1f6feb;">Job</span><span style="color: #0f2d6b; margin-left: -3px;">Nest</span>
          </div>
          <h1>Create Your Password</h1>
          <p class="subtitle">Secure your new account</p>
        </div>

        <div class="right-panel">
          <div class="form-group">
            <input type="password" id="new-password" placeholder="Password" required>
          </div>
          <div class="form-group">
            <input type="password" id="confirm-password" placeholder="Confirm Password" required>
          </div>
          <label class="checkbox-group">
            <!-- ID added to handle toggle in JS -->
            <input type="checkbox" id="toggle-password-checkbox">
            Show password
          </label>

          <div class="actions">
            <!-- ID added for back button -->
            <button id="btn-back-to-register-step2" class="btn-ghost" type="button">Back</button>
            <button id="btn-register-final-submit" class="btn-primary" type="button">Next</button>
          </div>
        </div>
      </div>
    </div>
  </div>
    <div class="auth-theme-utility">
      <button class="theme-toggle" type="button" data-theme-toggle aria-label="Switch to dark mode"
        aria-pressed="false">
        <svg class="theme-toggle-sun" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="4.5"></circle>
          <path d="M12 2v2"></path>
          <path d="M12 20v2"></path>
          <path d="m4.93 4.93 1.41 1.41"></path>
          <path d="m17.66 17.66 1.41 1.41"></path>
          <path d="M2 12h2"></path>
          <path d="M20 12h2"></path>
          <path d="m4.93 19.07 1.41-1.41"></path>
          <path d="m17.66 6.34 1.41-1.41"></path>
        </svg>
        <svg class="theme-toggle-moon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M21 12.79A9 9 0 0 1 11.21 3 7 7 0 1 0 12 21a9 9 0 0 0 9-8.21Z"></path>
        </svg>
        <span class="theme-toggle-ball" aria-hidden="true"></span>
      </button>
    </div>
  </div>

</body>

</html>
